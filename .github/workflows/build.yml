name: Build Unsigned IPA (TrollStore)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  PROJECT_NAME: PhotosApp
  OUTPUT_DIR: build

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Generate Xcode project via Swift Package Manager
        run: |
          mkdir -p Sources
          # Copy all .swift files preserving directory structure into Sources/
          find . -name '*.swift' ! -name 'Package.swift' ! -path './Sources/*' ! -path './.build/*' | while read f; do
            rel="${f#./}"
            dir="Sources/$(dirname "$rel")"
            mkdir -p "$dir"
            cp "$f" "$dir/"
          done
          # Copy Info.plist into Sources
          cp Info.plist Sources/Info.plist
          # Init SPM package then generate xcodeproj
          # Remove Package.swift from root first, SPM init creates a fresh one
          rm -f Package.swift
          cd Sources
          swift package init --type executable --name "${{ env.PROJECT_NAME }}"
          cd ..
          # The init created Sources/main.swift and Sources/Package.swift; replace Package.swift
          # We need our own Package.swift at root level
          cat > Package.swift << 'PACKEOF'
// swift-tools-version:5.5
import PackageDescription
let package = Package(
    name: "PhotosApp",
    platforms: [.iOS(.v15)],
    dependencies: [],
    targets: [
        .target(
            name: "PhotosApp",
            dependencies: [],
            path: "Sources"
        ),
    ]
)
PACKEOF
          # Remove the auto-generated main.swift
          rm -f Sources/main.swift
          # Generate .xcodeproj
          swift package generate-xcodeproj
          ls -la *.xcodeproj/

      - name: Build .app (release, no signing)
        run: |
          xcodebuild \
            -project "${{ env.PROJECT_NAME }}.xcodeproj" \
            -scheme "${{ env.PROJECT_NAME }}" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "${{ env.OUTPUT_DIR }}/dd" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            build

      - name: Package unsigned .ipa
        run: |
          mkdir -p "${{ env.OUTPUT_DIR }}/ipa/Payload"
          cp -R "${{ env.OUTPUT_DIR }}/dd/Build/Products/Release-iphoneos/${{ env.PROJECT_NAME }}.app" \
                "${{ env.OUTPUT_DIR }}/ipa/Payload/"
          cd "${{ env.OUTPUT_DIR }}/ipa"
          zip -r9 --symlinks "${{ env.PROJECT_NAME }}.ipa" Payload/
          ls -lh "${{ env.PROJECT_NAME }}.ipa"

      - name: Upload IPA as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}-unsigned.ipa
          path: ${{ env.OUTPUT_DIR }}/ipa/${{ env.PROJECT_NAME }}.ipa
          if-no-files-found: error
