name: Build Unsigned IPA (TrollStore)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:          # Allows manual trigger from GitHub UI

env:
  PROJECT_NAME: PhotosApp    # Must match your Xcode project name
  SCHEME_NAME: PhotosApp     # Must match your Xcode scheme name
  OUTPUT_DIR: build

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: List available simulators (diagnostic)
        run: xcrun simctl list devices --json || true

      - name: Build archive (release)
        run: |
          xcodebuild archive \
            -project "${{ env.PROJECT_NAME }}.xcodeproj" \
            -scheme "${{ env.SCHEME_NAME }}" \
            -configuration Release \
            -archivePath "${{ env.OUTPUT_DIR }}/${{ env.PROJECT_NAME }}.xcarchive" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            -destination "generic/platform=iOS" \
            | xcpretty

      - name: Export unsigned IPA
        run: |
          mkdir -p "${{ env.OUTPUT_DIR }}/ipa"
          xcodebuild -exportArchive \
            -archivePath "${{ env.OUTPUT_DIR }}/${{ env.PROJECT_NAME }}.xcarchive" \
            -exportPath "${{ env.OUTPUT_DIR }}/ipa" \
            -exportOptionsPlist .github/exportOptions.plist \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            | xcpretty

      - name: Upload IPA as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}-unsigned.ipa
          path: ${{ env.OUTPUT_DIR }}/ipa/*.ipa
          if-no-files-found: error
